<!DOCTYPE html>

  <!-- ===== NAVIGATION ===== -->

  <!-- ===== PAGE HEADER ===== -->
  <section class="page-header">
    <h1>Get In Touch</h1>
  </section>

  <!-- ===== CONTACT FORM ===== -->
  <section class="section contact-section">
    <div class="contact-grid">

      <!--
        Note for Abhishek: this form doesn't actually send an email yet.
        To make it work, you'd hook it up to something like Formspree,
        EmailJS, or a small backend. For now it just prevents the page
        from reloading (see js/script.js).
      -->
      <form class="contact-form" id="contactForm">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your full name" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" placeholder="Write your message here..." required></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Send</button>
        <p class="form-status" id="formStatus"></p>
      </form>

      <div class="contact-info">
        <h3>Other Ways to Reach Me</h3>
        <ul class="contact-links">
          <!-- TODO: replace # and email with your real details -->
          <li><a href="#" target="_blank" rel="noopener">GitHub &rarr;</a></li>
          <li><a href="#" target="_blank" rel="noopener">LinkedIn &rarr;</a></li>
          <li><a href="mailto:youremail@example.com">youremail@example.com</a></li>
        </ul>
      </div>

    </div>
  </section>

      <li><a href="6060abhishek@example.com">Email</a></li>
    </ul>
